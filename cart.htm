<h1>Your Cart 🛒</h1>

<ul id="cartItems"></ul>

<h2>Total: <span id="total">0</span> EGP</h2>

<br>

<a href="products.html">Back to Products</a>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

let list = document.getElementById("cartItems");
let total = 0;

cart.forEach(item => {
    let li = document.createElement("li");
    li.innerText = item.name + " - " + item.price + " EGP";
    list.appendChild(li);

    total += item.price;
});

document.getElementById("total").innerText = total;
</script>
<a id="orderBtn" href="#" target="_blank">Send Order on WhatsApp</a>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

let text = "My Order:%0A";

let total = 0;

cart.forEach(item => {
    text += "- " + item.name + " : " + item.price + "%0A";
    total += item.price;
});

text += "%0ATotal: " + total + " EGP";

document.getElementById("orderBtn").href =
"https://wa.me/201070063817?text=" + text;
</script>
