<!DOCTYPE html>
<html>
<head>
<title>Cart</title>
</head>

<body style="background:#0a0a0f;color:white;font-family:Arial;text-align:center;">

<h1>🛒 Your Cart</h1>

<ul id="cart"></ul>

<h2>Total: <span id="total">0</span> EGP</h2>

<a id="order" target="_blank">
<button style="padding:10px;background:#25D366;color:white;border:none;border-radius:8px;">
Send WhatsApp Order
</button>
</a>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let total = 0;

let list = document.getElementById("cart");

cart.forEach(item=>{
let li = document.createElement("li");
li.innerText = item.name + " - " + item.price;
list.appendChild(li);
total += item.price;
});

document.getElementById("total").innerText = total;

let text = "My Order:%0A";

cart.forEach(item=>{
text += item.name + " - " + item.price + "%0A";
});

document.getElementById("order").href =
"https://wa.me/201070063817?text=" + text;
</script>

</body>
</html>
