<!DOCTYPE html>
<html>
<head>
<title>Products</title>
</head>

<body style="background:#0a0a0f;color:white;font-family:Arial;text-align:center;">

<h1>Products</h1>

<h3>RAM 16GB - 1200 EGP</h3>
<button onclick="addToCart('RAM 16GB',1200)">Add</button>

<h3>SSD 512GB - 900 EGP</h3>
<button onclick="addToCart('SSD 512GB',900)">Add</button>

<br><br>

<a href="cart.html">Go to Cart 🛒</a>

<script>
function addToCart(name,price){
let cart = JSON.parse(localStorage.getItem("cart")) || [];

cart.push({name,price});

localStorage.setItem("cart",JSON.stringify(cart));

alert("Added ✔");
}
</script>

</body>
</html>
