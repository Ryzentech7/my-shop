<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ryzen Tech</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0d0d0d;
color:white;
}

header{
background:#000;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
z-index:100;
}

.logo{
font-size:35px;
font-weight:bold;
color:lime;
}

nav a{
color:white;
text-decoration:none;
margin:0 15px;
font-size:18px;
}

.hero{
text-align:center;
padding:80px 20px;
background:#111;
}

.hero h1{
font-size:50px;
margin:0;
}

.hero p{
color:#aaa;
font-size:20px;
}

.products{
display:flex;
justify-content:center;
gap:25px;
padding:40px;
flex-wrap:wrap;
}

.product{
background:#161616;
padding:20px;
border-radius:20px;
width:280px;
text-align:center;
transition:0.3s;
box-shadow:0 0 15px rgba(0,255,0,0.1);
}

.product:hover{
transform:translateY(-5px);
}

.product img{
width:100%;
height:220px;
object-fit:cover;
border-radius:15px;
}

.product h2{
margin-top:15px;
}

.desc{
color:#aaa;
font-size:14px;
margin-top:10px;
}

.price{
font-size:28px;
color:lime;
margin:15px 0;
}

.qty{
width:70px;
padding:10px;
border:none;
border-radius:10px;
font-size:18px;
text-align:center;
}

button{
background:lime;
border:none;
padding:12px 25px;
font-size:18px;
border-radius:10px;
cursor:pointer;
margin-top:15px;
font-weight:bold;
}

#cart{
background:#111;
margin:20px;
padding:25px;
border-radius:20px;
}

.cart-item{
background:#1a1a1a;
padding:12px;
margin:10px 0;
border-radius:10px;
}

input, select{
width:95%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
font-size:16px;
}

#total{
font-size:28px;
color:lime;
margin-top:15px;
}

footer{
background:#000;
padding:20px;
text-align:center;
margin-top:40px;
color:#777;
}

</style>
</head>

<body>

<header>

<div class="logo">
RYZEN TECH
</div>

<nav>
<a href="#">Home</a>
<a href="#">Products</a>
<a href="#">Contact</a>
</nav>

</header>

<section class="hero">

<h1>Gaming & PC Parts</h1>

<p>Best SSDs, RAMs & Computer Accessories</p>

</section>

<section class="products">

<div class="product">

<img src="https://images.unsplash.com/photo-1591488320449-011701bb6704">

<h2>Kingston RAM 16GB</h2>

<p class="desc">
DDR4 High Performance Gaming RAM
</p>

<div class="price">2200 EGP</div>

<input type="number"
class="qty"
id="qty1"
value="1"
min="1">

<br>

<button onclick="addToCart('Kingston RAM 16GB',2200,'qty1')">
Add To Cart
</button>

</div>

<div class="product">

<img src="https://images.unsplash.com/photo-1587202372775-e229f172b9d7">

<h2>Samsung SSD 1TB</h2>

<p class="desc">
Ultra Fast NVMe SSD Storage
</p>

<div class="price">4500 EGP</div>

<input type="number"
class="qty"
id="qty2"
value="1"
min="1">

<br>

<button onclick="addToCart('Samsung SSD 1TB',4500,'qty2')">
Add To Cart
</button>

</div>

</section>

<section id="cart">

<h2>Shopping Cart 🛒</h2>

<div id="cart-items"></div>

<h2 id="total">
Total: 0 EGP
</h2>

<input type="text"
id="customer"
placeholder="Your Name">

<input type="text"
id="phone"
placeholder="Phone Number">

<select id="payment">

<option>Cash On Delivery</option>

<option>Visa</option>

</select>

<button onclick="checkout()">
Checkout
</button>

</section>

<footer>

© 2026 Ryzen Tech

</footer>

<script type="module">

import { initializeApp }

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc
}

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyD3faYreStKWi1Pf8OWgig0nCKZbOYEv5w",

authDomain: "ryzentech-c33ea.firebaseapp.com",

projectId: "ryzentech-c33ea",

storageBucket: "ryzentech-c33ea.firebasestorage.app",

messagingSenderId: "1056330967257",

appId: "1:1056330967257:web:778e94f24a08f46348f6c8",

measurementId: "G-Z3Q4BQYVDE"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

let cart = [];

let total = 0;

window.addToCart = function(product, price, qtyId){

let qty =
parseInt(document.getElementById(qtyId).value);

let finalPrice = price * qty;

cart.push({
product,
qty,
finalPrice
});

let div = document.createElement("div");

div.className = "cart-item";

div.innerText =
product + " x" + qty +
" = " + finalPrice + " EGP";

document.getElementById("cart-items")
.appendChild(div);

total += finalPrice;

document.getElementById("total")
.innerText =
"Total: " + total + " EGP";

}

window.checkout = async function(){

let customer =
document.getElementById("customer").value;

let phone =
document.getElementById("phone").value;

let payment =
document.getElementById("payment").value;

if(cart.length == 0){
alert("Cart is empty");
return;
}

await addDoc(collection(db, "orders"), {

customer,
phone,
payment,
cart,
total,
date: new Date()

});

alert("Order Saved Successfully 🔥");

cart = [];

document.getElementById("cart-items")
.innerHTML = "";

document.getElementById("total")
.innerText =
"Total: 0 EGP";

}

</script>

</body>
</html>
