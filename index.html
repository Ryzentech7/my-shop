<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RYZENTECH PRO</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0a0a0f;
color:white;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
background:#000;
color:#8b5cf6;
position:sticky;
top:0;
}

nav a{
color:white;
margin:0 10px;
text-decoration:none;
}

nav a:hover{
color:#8b5cf6;
}

/* HERO */
.hero{
text-align:center;
padding:60px;
background:linear-gradient(#111827,#0a0a0f);
}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
padding:20px;
}

/* 🌈 RGB CARD */
.card{
background:#111827;
padding:15px;
border-radius:15px;
position:relative;
z-index:1;
}

.card::before{
content:"";
position:absolute;
top:-2px;
left:-2px;
right:-2px;
bottom:-2px;
border-radius:16px;
background:linear-gradient(90deg, red, blue, green, purple, red);
background-size:300% 300%;
z-index:-1;
animation:rgb 5s linear infinite;
}

@keyframes rgb{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.card img{
width:100%;
border-radius:10px;
}

.price{
color:#8b5cf6;
font-size:20px;
}

/* STOCK */
.in{color:#00ff88;}
.out{color:#ff4d4d;}

/* CART */
#cart{
background:#111827;
margin:20px;
padding:20px;
border-radius:15px;
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:10px;
border:none;
background:#1f2937;
color:white;
}

button{
width:100%;
padding:10px;
margin-top:10px;
background:#8b5cf6;
border:none;
color:white;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#a855f7;
}

#payinfo{
color:#8b5cf6;
font-weight:bold;
margin-top:10px;
}

/* CONTACT */
#contact{
text-align:center;
padding:20px;
color:#aaa;
}

</style>

</head>

<body>

<header>
<div>RYZENTECH PRO</div>
<nav>
<a href="#home">Home</a>
<a href="#products">Products</a>
<a href="#contact">Contact</a>
</nav>
</header>

<section class="hero" id="home">
<h1>Gaming Hardware Store</h1>
<p>RAM • SSD • Accessories • RGB Parts</p>
</section>

<!-- PRODUCTS -->
<section class="products" id="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1591488320449-011701bb6704">
<h3>Kingston RAM RGB</h3>
<p class="in">In Stock</p>
<div class="price">2200 EGP</div>
<button onclick="add('RAM RGB',2200)">Add To Cart</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1587202372775-e229f172b9d7">
<h3>Samsung SSD 1TB</h3>
<p class="out">Out of Stock</p>
<div class="price">4500 EGP</div>
<button onclick="add('SSD 1TB',4500)">Add To Cart</button>
</div>

</section>

<!-- CART -->
<section id="cart">

<h2>Checkout</h2>

<div id="items"></div>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="address" placeholder="Address">

<select id="payment" onchange="showPayment()">
<option>Cash on Delivery</option>
<option>InstaPay</option>
<option>Wallet</option>
</select>

<p id="payinfo"></p>

<button onclick="order()">Place Order</button>

</section>

<!-- CONTACT -->
<section id="contact">
<h2>Contact Us</h2>
<p>WhatsApp: 01070063817</p>
<p>Instagram: @ryzentech</p>
</section>

<script>

let cart = [];

// ADD TO CART
function add(name,price){
cart.push({name,price});
document.getElementById("items").innerHTML +=
`<p>${name} - ${price} EGP</p>`;
}

// PAYMENT
function showPayment(){

let p=document.getElementById("payment").value;

if(p==="InstaPay"){
document.getElementById("payinfo").innerText="Instapay: 01142074413";
}
else if(p==="Wallet"){
document.getElementById("payinfo").innerText="Wallet: 01142074413";
}
else{
document.getElementById("payinfo").innerText="";
}

}

// ORDER + TELEGRAM
function order(){

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let address=document.getElementById("address").value;
let payment=document.getElementById("payment").value;

let items=cart.map(i=>`• ${i.name} - ${i.price} EGP`).join("\n");
let total=cart.reduce((s,i)=>s+i.price,0);

let message=`
🔥 NEW ORDER - RYZENTECH PRO

Name: ${name}
Phone: ${phone}
Address: ${address}
Payment: ${payment}

Items:
${items}

Total: ${total} EGP
`;

fetch("https://api.telegram.org/bot8769220770:AAEe6040gs3Y_Ikesi6jmrsElY_sNQLegHQ
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
chat_id:7405848304
text:message
})
});

alert("Order Sent 🔥");

cart=[];
document.getElementById("items").innerHTML="";
}

</script>

</body>
</html>
