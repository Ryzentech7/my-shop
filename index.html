<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ryzen Store</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
}

header{
background:black;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
}

.logo{
font-size:28px;
font-weight:bold;
color:lime;
}

nav a{
color:white;
text-decoration:none;
margin:10px;
font-size:18px;
}

.hero{
text-align:center;
padding:60px 20px;
background:#1a1a1a;
}

.hero h1{
font-size:40px;
}

.products{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:30px;
}

.product{
background:#222;
width:260px;
padding:20px;
border-radius:20px;
text-align:center;
transition:0.3s;
}

.product:hover{
transform:scale(1.05);
}

.product img{
width:100%;
border-radius:15px;
}

.price{
font-size:22px;
color:lime;
margin:10px;
}

button{
background:lime;
border:none;
padding:12px 20px;
font-size:18px;
border-radius:10px;
cursor:pointer;
}

#cart{
background:black;
margin:20px;
padding:20px;
border-radius:20px;
}

input, select{
width:90%;
padding:12px;
margin:10px;
border:none;
border-radius:10px;
font-size:16px;
}

footer{
background:#000;
text-align:center;
padding:20px;
margin-top:40px;
}

.socials a{
color:lime;
margin:10px;
text-decoration:none;
}

</style>
</head>

<body>

<header>

<div class="logo">
RYZEN STORE
</div>

<nav>
<a href="#">Home</a>
<a href="#">Products</a>
<a href="#">Contact</a>
</nav>

</header>

<section class="hero">

<h1>Welcome To Ryzen Store</h1>

<p>Best Fashion Products Online</p>

</section>

<section class="products">

<div class="product">

<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=800">

<h2>Sport Shoes</h2>

<p class="price">500 EGP</p>

<button onclick="addToCart('Sport Shoes - 500 EGP')">
Add To Cart
</button>

</div>

<div class="product">

<img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?q=80&w=800">

<h2>T-Shirt</h2>

<p class="price">300 EGP</p>

<button onclick="addToCart('T-Shirt - 300 EGP')">
Add To Cart
</button>

</div>

<div class="product">

<img src="https://images.unsplash.com/photo-1503341455253-b2e723bb3dbb?q=80&w=800">

<h2>Hoodie</h2>

<p class="price">700 EGP</p>

<button onclick="addToCart('Hoodie - 700 EGP')">
Add To Cart
</button>

</div>

</section>

<section id="cart">

<h2>Shopping Cart 🛒</h2>

<ul id="cart-items"></ul>

<h3>Checkout</h3>

<input type="text" id="name" placeholder="Your Name">

<input type="text" id="phone" placeholder="Phone Number">

<input type="text" id="address" placeholder="Your Address">

<select id="payment">

<option>Cash On Delivery</option>

<option>Visa</option>

</select>

<br><br>

<button onclick="sendOrder()">
Place Order
</button>

</section>

<footer>

<p>© 2026 Ryzen Store</p>

<div class="socials">

<a href="#">Instagram</a>

<a href="#">TikTok</a>

<a href="#">WhatsApp</a>

</div>

</footer>

<script>

let cart = [];

function addToCart(product){

cart.push(product);

let li = document.createElement("li");

li.innerText = product;

document.getElementById("cart-items").appendChild(li);

}

function sendOrder(){

let name = document.getElementById("name").value;

let phone = document.getElementById("phone").value;

let address = document.getElementById("address").value;

let payment = document.getElementById("payment").value;

let message =
"New Order:%0A%0A" +
"Name: " + name + "%0A" +
"Phone: " + phone + "%0A" +
"Address: " + address + "%0A" +
"Payment: " + payment + "%0A%0A" +
"Products:%0A" + cart.join("%0A");

window.open(
"https://wa.me/201070063817?text=" + message,
"_blank"
);

}

</script>

</body>
</html>
