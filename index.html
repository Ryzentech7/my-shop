<style>

body{

background:#111;
color:white;
}

header{
background:black;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:40px;
font-weight:bold;
color:lime;
}

nav a{
color:white;
margin:0 10px;
text-decoration:none;
font-size:20px;
}

.hero{
text-align:center;
padding:80px 20px;

}

.hero h1{

}

.hero p{

}

.products{

.card{

.card img{

.card h2{

.price{

button{

</head>

<body>

<header>

<nav>
<a href="#">Home</a>

<a href="#">Contact</a>
</nav>
</header>

<section class="hero">
<h1>Welcome To Ryzen Tech</h1>
<p>Gaming & Computer Accessories</p>
</section>

<section class="products">

<div class="card">

<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff">

<h2>Gaming Mouse</h2>

<div class="price">800 EGP</div>

<button onclick="orderNow('Gaming Mouse',800)">
Add To Cart
</button>

</div>

</section>

<footer>

</footer>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import { getFirestore, collection, addDoc }

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyD3faYreStKWi1Pf8OWgig0nCKZbOYEv5w",
authDomain: "ryzentech-c33ea.firebaseapp.com",
projectId: "ryzentech-c33ea",
storageBucket: "ryzentech-c33ea.firebasestorage.app",
messagingSenderId: "1056330967257",
appId: "1:1056330967257:web:778e94f24a08f46348f6c8",
measurementId: "G-Z3Q4BQYVDE"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

window.orderNow = async function(product, price){

let customer = prompt("Enter Your Name");

let phone = prompt("Enter Your Phone");

if(!customer || !phone){
alert("Enter all data");
return;
}

await addDoc(collection(db, "orders"), {

product: product,
price: price,
customer: customer,
phone: phone,
date: new Date()

});

alert("Order Sent Successfully 🔥");

}

</script>
