<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RYZEN TECH</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0a0a0f;
color:white;
scroll-behavior:smooth;
}

/* HEADER NAV */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
background:#000;
position:sticky;
top:0;
z-index:1000;
}

header h1{
color:#8b5cf6;
font-size:30px;
}

nav a{
color:white;
margin:0 10px;
text-decoration:none;
}

nav a:hover{
color:#8b5cf6;
}

/* HERO */
.hero{
text-align:center;
padding:60px 20px;
background:linear-gradient(#111827,#0a0a0f);
}

.hero h2{
font-size:40px;
}

.hero p{
color:#aaa;
margin-top:10px;
}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
padding:20px;
}

/* RGB CARD */
.card{
background:#111827;
padding:15px;
border-radius:15px;
position:relative;
overflow:hidden;
}

.card::before{
content:"";
position:absolute;
inset:0;
padding:2px;
background:linear-gradient(90deg,red,blue,green,purple,red);
background-size:300% 300%;
animation:rgb 3s linear infinite;
z-index:-1;
}

@keyframes rgb{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.card::after{
content:"";
position:absolute;
inset:2px;
background:#111827;
border-radius:13px;
z-index:-1;
}

.card img{
width:100%;
border-radius:10px;
}

.price{
color:#8b5cf6;
font-size:18px;
margin-top:5px;
}

.stock{
font-size:14px;
margin-top:5px;
}

.in{color:#00ff88;}
.out{color:#ff4d4d;}

/* BUTTON */
button{
width:100%;
padding:10px;
margin-top:10px;
background:#8b5cf6;
border:none;
color:white;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#a855f7;
}

/* CART */
#cart{
background:#111827;
margin:20px;
padding:20px;
border-radius:15px;
}

.item{
display:flex;
justify-content:space-between;
background:#1f2937;
padding:8px;
margin-top:5px;
border-radius:8px;
}

#total{
margin-top:10px;
color:#00ffcc;
font-size:22px;
}

/* INPUTS */
input,select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:10px;
border:none;
background:#1f2937;
color:white;
}

/* PAY INFO */
#payinfo{
margin-top:10px;
color:#00ffcc;
}

/* FOOTER */
footer{
text-align:center;
padding:30px;
color:#aaa;
margin-top:30px;
border-top:1px solid #222;
}

</style>

</head>

<body>

<!-- HEADER -->
<header>
<h1>RYZEN TECH</h1>
<nav>
<a href="#home">Home</a>
<a href="#products">Products</a>
<a href="#contact">Contact</a>
</nav>
</header>

<!-- HERO -->
<section class="hero" id="home">
<h2>Gaming Hardware Store</h2>
<p>RAM • SSD • RGB Parts • Accessories</p>
</section>

<!-- PRODUCTS -->
<section class="products" id="products">

<!-- PRODUCT 1 -->
<div class="card">
<img src="https://images.unsplash.com/photo-1591488320449-011701bb6704">
<h3>Kingston RAM RGB</h3>
<p class="price">2200 EGP</p>
<p class="stock in">In Stock</p>
<button onclick="addToCart('RAM RGB',2200,true)">Add To Cart</button>
</div>

<!-- PRODUCT 2 -->
<div class="card">
<img src="https://images.unsplash.com/photo-1587202372775-e229f172b9d7">
<h3>SSD 1TB</h3>
<p class="price">4500 EGP</p>
<p class="stock in">In Stock</p>
<button onclick="addToCart('SSD 1TB',4500,true)">Add To Cart</button>
</div>

</section>

<!-- CART -->
<section id="cart">

<h2>Checkout 🛒</h2>

<div id="items"></div>

<h2 id="total">Total: 0 EGP</h2>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="address" placeholder="Address">

<select id="payment" onchange="showPay()">
<option>Cash On Delivery</option>
<option>InstaPay</option>
<option>Wallet</option>
</select>

<p id="payinfo"></p>

<button onclick="checkout()">Place Order</button>

</section>

<!-- CONTACT -->
<footer id="contact">

<h3>Contact</h3>
<p>WhatsApp: 01070063817</p>

</footer>

<script>

let cart=[];
let total=0;

/* ADD TO CART */
function addToCart(name,price,stock){

if(!stock){
alert("Out of Stock ❌");
return;
}

cart.push({name,price});
render();

}

/* RENDER CART */
function render(){

let box=document.getElementById("items");
box.innerHTML="";
total=0;

cart.forEach(i=>{
total+=i.price;
box.innerHTML+=`
<div class="item">
<span>${i.name}</span>
<span>${i.price} EGP</span>
</div>
`;
});

document.getElementById("total").innerText="Total: "+total+" EGP";

}

/* PAYMENT */
function showPay(){

let p=document.getElementById("payment").value;

if(p==="InstaPay" || p==="Wallet"){
document.getElementById("payinfo").innerText="Send Money To: 01142074413";
}else{
document.getElementById("payinfo").innerText="";
}

}

/* CHECKOUT */
function checkout(){

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let address=document.getElementById("address").value;
let payment=document.getElementById("payment").value;

/* TELEGRAM BOT (عدل هنا) */
let BOT_TOKEN="YOUR_BOT_TOKEN";
let CHAT_ID="YOUR_CHAT_ID";

let items=cart.map(i=>i.name+" - "+i.price).join("\n");

let msg=
"🔥 NEW ORDER\n\n"+
"Name: "+name+"\n"+
"Phone: "+phone+"\n"+
"Address: "+address+"\n"+
"Payment: "+payment+"\n\n"+
"Items:\n"+items+"\n\n"+
"Total: "+total+" EGP";

fetch(`https://api.telegram.org/bot8769220770:AAEe6040gs3Y_Ikesi6jmrsElY_sNQLegHQ/sendMessage`,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
chat_id: "7405848304"
text:msg
})
});

alert("Order Sent 🔥");

cart=[];
render();

}

</script>

</body>
</html>
