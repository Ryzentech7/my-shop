<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ryzen Tech</title>

<style>

/* (CSS بتاعك زي ما هو بدون تغيير) */

body{
margin:0;
font-family:Arial;
background:#0a0a0f;
color:white;
overflow-x:hidden;
}

header{
background:#000;
padding:20px 40px;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
z-index:1000;
}

.logo{
font-size:34px;
font-weight:bold;
color:#8b5cf6;
text-shadow:0 0 10px rgba(139,92,246,0.5);
}

nav{
display:flex;
gap:20px;
}

nav a{
color:white;
text-decoration:none;
}

.hero{
padding:80px 20px;
text-align:center;
}

.products{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:30px;
padding:40px;
}

.card{
background:#111827;
width:300px;
padding:20px;
border-radius:20px;
}

.card img{
width:100%;
border-radius:15px;
}

.price{
color:#8b5cf6;
font-size:24px;
margin-top:10px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:#8b5cf6;
border:none;
color:white;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#a855f7;
}

#cart{
margin:30px;
padding:20px;
background:#111827;
border-radius:15px;
}

.item{
display:flex;
justify-content:space-between;
padding:8px;
background:#1f2937;
margin-top:5px;
border-radius:8px;
}

#total{
margin-top:15px;
color:#00ffcc;
font-size:24px;
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:10px;
border:none;
background:#1f2937;
color:white;
}

#payinfo{
margin-top:10px;
color:#00ffcc;
}

</style>

</head>

<body>

<header>
<div class="logo">RYZEN TECH</div>
</header>

<!-- PRODUCTS -->
<section class="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1591488320449-011701bb6704">
<h3>RAM RGB</h3>
<div class="price">2200 EGP</div>
<button onclick="add('RAM RGB',2200)">Add To Cart</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1587202372775-e229f172b9d7">
<h3>SSD 1TB</h3>
<div class="price">4500 EGP</div>
<button onclick="add('SSD 1TB',4500)">Add To Cart</button>
</div>

</section>

<!-- CART -->
<section id="cart">

<h2>Checkout</h2>

<div id="items"></div>
<div id="total">Total: 0</div>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="address" placeholder="Address">

<select id="payment" onchange="showPay()">
<option>Cash</option>
<option>InstaPay</option>
<option>Wallet</option>
</select>

<p id="payinfo"></p>

<button onclick="checkout()">Checkout</button>

</section>

<script>

let cart=[];
let total=0;

/* ADD */
function add(name,price){
cart.push({name,price});
render();
}

/* RENDER */
function render(){
let box=document.getElementById("items");
box.innerHTML="";
total=0;

cart.forEach(i=>{
total+=i.price;
box.innerHTML+=`
<div class="item">
<span>${i.name}</span>
<span>${i.price}</span>
</div>
`;
});

document.getElementById("total").innerText="Total: "+total;
}

/* PAYMENT */
function showPay(){
let p=document.getElementById("payment").value;

if(p==="InstaPay" || p==="Wallet"){
document.getElementById("payinfo").innerText="Send to: 01142074413";
}else{
document.getElementById("payinfo").innerText="";
}
}

/* 🚀 CHECKOUT + TELEGRAM */
function checkout(){

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let address=document.getElementById("address").value;
let payment=document.getElementById("payment").value;

/* 🔥 BOT INFO (هنا تحط توكنك و شات ايدي) */
let BOT_TOKEN = 8769220770:AAEe6040gs3Y_Ikesi6jmrsElY_sNQLegHQ
let CHAT_ID = 7405848304

let itemsText = cart.map(i=>`${i.name} - ${i.price}`).join("\n");

let message =
"🔥 NEW ORDER\n\n" +
"Name: " + name + "\n" +
"Phone: " + phone + "\n" +
"Address: " + address + "\n" +
"Payment: " + payment + "\n\n" +
"Items:\n" + itemsText + "\n\n" +
"Total: " + total;

/* SEND TO TELEGRAM */
fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
chat_id:CHAT_ID,
text:message
})
});

alert("Order Sent 🔥");

cart=[];
render();

document.getElementById("payinfo").innerText="";

}

</script>

</body>
</html>
