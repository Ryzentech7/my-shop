<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RYZENTECH</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0a0a0f;
color:white;
scroll-behavior:smooth;
}
.card{
box-shadow:0 10px 25px rgba(0,0,0,0.4);
transition:0.3s;
}

.card:hover{
transform:scale(1.03);
}

.price{
font-size:20px;
font-weight:bold;
color:#8b5cf6;
margin:5px 0;
}

.status{
font-size:14px;
margin:5px 0;
}
/* HEADER */
header{
text-align:center;
padding:25px;
background:#000;
}

header h1{
font-size:40px;
color:#8b5cf6;
margin:0;
text-shadow:0 0 10px #8b5cf6;
}

/* PRODUCTS */
<section class="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1591488320449-011701bb6704">

<h3>Kingston RAM RGB</h3>

<p class="price">2200 EGP</p>

<p class="status in">In Stock</p>

<button onclick="add('RAM RGB',2200)">Add To Cart</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1587202372775-e229f172b9d7">

<h3>Samsung SSD 1TB</h3>

<p class="price">4500 EGP</p>

<p class="status in">In Stock</p>

<button onclick="add('SSD 1TB',4500)">Add To Cart</button>
</div>

</section>

/* RGB CARD */
.card{
background:#111827;
padding:15px;
border-radius:15px;
position:relative;
overflow:hidden;
}

.card::before{
content:"";
position:absolute;
inset:0;
padding:2px;
border-radius:15px;
background:linear-gradient(90deg,red,blue,green,purple,red);
background-size:300% 300%;
animation:rgb 3s linear infinite;
z-index:-1;
}

@keyframes rgb{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.card::after{
content:"";
position:absolute;
inset:2px;
background:#111827;
border-radius:13px;
z-index:-1;
}

.card img{
width:100%;
border-radius:10px;
}

button{
width:100%;
padding:10px;
margin-top:10px;
background:#8b5cf6;
border:none;
color:white;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#a855f7;
}

/* CART */
#cart{
background:#111827;
margin:20px;
padding:20px;
border-radius:15px;
}

.item{
display:flex;
justify-content:space-between;
background:#1f2937;
padding:8px;
margin-top:5px;
border-radius:8px;
}

#total{
margin-top:10px;
color:#00ffcc;
font-weight:bold;
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:10px;
border:none;
background:#1f2937;
color:white;
}

#payinfo{
margin-top:10px;
color:#00ffcc;
}

#toast{
position:fixed;
bottom:20px;
right:20px;
background:#8b5cf6;
padding:10px;
border-radius:10px;
display:none;
}

</style>

</head>

<body>

<header>
<h1>RYZEN TECH</h1>
<p>Gaming Hardware Store</p>
</header>

<!-- PRODUCTS -->
<section class="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1591488320449-011701bb6704">
<h3>Kingston RAM RGB</h3>
<button onclick="add('RAM RGB',2200)">Add To Cart</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1587202372775-e229f172b9d7">
<h3>SSD 1TB</h3>
<button onclick="add('SSD 1TB',4500)">Add To Cart</button>
</div>

</section>

<!-- CART -->
<section id="cart">

<h2>Checkout</h2>

<div id="items"></div>
<div id="total">Total: 0</div>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">

<select id="payment" onchange="pay()">
<option>Cash on Delivery</option>
<option>InstaPay</option>
<option>Wallet</option>
</select>

<p id="payinfo"></p>

<button onclick="order()">Place Order</button>

</section>

<div id="toast"></div>

<script>

/* CART */
let cart=[];

function add(name,price){
cart.push({name,price});
render();
toast("Added ✔");
}

function remove(i){
cart.splice(i,1);
render();
}

/* RENDER */
function render(){
let box=document.getElementById("items");
box.innerHTML="";

let total=0;

cart.forEach((i,index)=>{
total+=i.price;
box.innerHTML+=`
<div class="item">
<span>${i.name}</span>
<span>${i.price}</span>
</div>
`;
});

document.getElementById("total").innerText="Total: "+total;
}

/* PAYMENT */
function pay(){
let p=document.getElementById("payment").value;

if(p==="InstaPay"){
document.getElementById("payinfo").innerText="01142074413";
}
else if(p==="Wallet"){
document.getElementById("payinfo").innerText="01142074413";
}
else{
document.getElementById("payinfo").innerText="";
}
}

/* TOAST */
function toast(msg){
let t=document.getElementById("toast");
t.innerText=msg;
t.style.display="block";

setTimeout(()=>t.style.display="none",2000);
}

/* 🚀 ORDER + TELEGRAM */
function order(){

if(cart.length===0){
toast("Cart empty");
return;
}

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let payment=document.getElementById("payment").value;

let items=cart.map(i=>`• ${i.name} - ${i.price}`).join("\n");
let total=cart.reduce((s,i)=>s+i.price,0);

let message=`
🔥 NEW ORDER - RYZENTECH

Name: ${name}
Phone: ${phone}
Payment: ${payment}

Items:
${items}

Total: ${total}
`;

/* TELEGRAM BOT */
fetch("https://api.telegram.org/bo8769220770:AAEe6040gs3Y_Ikesi6jmrsElY_sNQLegHQt/sendMessage",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
chat_id:7405848304
  text:message
})
});

toast("Order Sent 🔥");

cart=[];
render();

}

</script>

</body>
</html>
