<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RYZENTECH</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0a0a0f;
color:white;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
padding:20px;
background:#000;
color:#8b5cf6;
position:sticky;
top:0;
}

/* HERO */
.hero{
text-align:center;
padding:50px;
}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
padding:20px;
}

/* 🌈 RGB FRAME ONLY */
.card{
background:#111827;
padding:15px;
border-radius:15px;
position:relative;
overflow:hidden;
}

.card::before{
content:"";
position:absolute;
top:-2px;
left:-2px;
right:-2px;
bottom:-2px;
border-radius:16px;
background:linear-gradient(90deg,red,blue,green,purple,red);
background-size:300% 300%;
z-index:-1;
animation:rgb 4s linear infinite;
}

@keyframes rgb{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.card img{
width:100%;
border-radius:10px;
}

.price{color:#8b5cf6;}

.in{color:#00ff88;}
.out{color:#ff4d4d;}

/* CART */
#cart{
background:#111827;
margin:20px;
padding:20px;
border-radius:15px;
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:10px;
border:none;
background:#1f2937;
color:white;
}

button{
width:100%;
padding:10px;
margin-top:10px;
background:#8b5cf6;
border:none;
color:white;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#a855f7;
}

#payinfo{
color:#8b5cf6;
font-weight:bold;
margin-top:10px;
}

/* CART ITEMS */
.item{
display:flex;
justify-content:space-between;
background:#1f2937;
padding:8px;
margin-top:5px;
border-radius:8px;
}

.remove{
color:red;
cursor:pointer;
}

.qty{
color:#00ffcc;
}

/* TOTAL */
#total{
margin-top:10px;
color:#00ffcc;
font-size:18px;
}

/* MODAL */
#modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
align-items:center;
justify-content:center;
}

.modal-box{
background:#111827;
padding:20px;
border-radius:10px;
width:80%;
text-align:center;
}

</style>

</head>

<body>

<header>
<div>RYZENTECH</div>
</header>

<section class="hero">
<h1>Gaming Hardware Store</h1>
<p>RAM • SSD • Accessories • RGB Parts</p>
</section>

<!-- PRODUCTS -->
<section class="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1591488320449-011701bb6704">
<h3>Kingston RAM RGB</h3>
<p class="in">In Stock</p>
<div class="price">2200 EGP</div>
<button onclick="add('RAM RGB',2200,true)">Add</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1587202372775-e229f172b9d7">
<h3>Samsung SSD 1TB</h3>
<p class="out">Out of Stock</p>
<div class="price">4500 EGP</div>
<button disabled>Out of Stock</button>
</div>

</section>

<!-- CART -->
<section id="cart">

<h2>Checkout</h2>

<div id="items"></div>

<div id="total">Total: 0 EGP</div>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="address" placeholder="Address">

<select id="payment" onchange="showPayment()">
<option>Cash on Delivery</option>
<option>InstaPay</option>
<option>Wallet</option>
</select>

<p id="payinfo"></p>

<button onclick="order()">Place Order</button>

</section>

<!-- MODAL -->
<div id="modal">
<div class="modal-box">
<h3>Order Sent ✅</h3>
<p>We will contact you soon</p>
<button onclick="closeModal()">OK</button>
</div>
</div>

<script>

let cart=[];

/* ADD WITH QTY */
function add(name,price,stock){

if(!stock){
alert("Out of Stock ❌");
return;
}

let found=cart.find(i=>i.name===name);

if(found){
found.qty++;
}else{
cart.push({name,price,qty:1});
}

render();
}

/* REMOVE */
function remove(i){
cart.splice(i,1);
render();
}

/* RENDER */
function render(){

let box=document.getElementById("items");
box.innerHTML="";

cart.forEach((i,index)=>{
box.innerHTML+=`
<div class="item">
<span>${i.name} x${i.qty}</span>
<span>${i.price*i.qty} EGP</span>
<span class="remove" onclick="remove(${index})">X</span>
</div>
`;
});

let total=cart.reduce((s,i)=>s+i.price*i.qty,0);
document.getElementById("total").innerText="Total: "+total+" EGP";

}

/* PAYMENT */
function showPayment(){

let p=document.getElementById("payment").value;
let info=document.getElementById("payinfo");

if(p==="InstaPay"){
info.innerText="Instapay: 01142074413";
}
else if(p==="Wallet"){
info.innerText="Wallet: 01142074413";
}
else{
info.innerText="";
}

}

/* ORDER */
function order(){

if(cart.length===0){
alert("Cart is empty");
return;
}

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let address=document.getElementById("address").value;

if(!name || !phone){
alert("Fill name and phone");
return;
}

let items=cart.map(i=>`• ${i.name} x${i.qty} = ${i.price*i.qty}`).join("\n");
let total=cart.reduce((s,i)=>s+i.price*i.qty,0);

let message=`
🔥 NEW ORDER

Name: ${name}
Phone: ${phone}
Address: ${address}

Items:
${items}

Total: ${total} EGP
`;

fetch("https://api.telegram.org/bot8769220770:AAEe6040gs3Y_Ikesi6jmrsElY_sNQLegHQ/sendMessage",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
chat_id:7405848304
text:message
})
});

/* SHOW MODAL */
document.getElementById("modal").style.display="flex";

/* RESET */
cart=[];
render();

}

function closeModal(){
document.getElementById("modal").style.display="none";
}

</script>

</body>
</html>
