<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RYZEN TECH STORE</title>

<style>
body{
font-family:Arial;
background:#0a0a0f;
color:white;
text-align:center;
}

button{
padding:10px;
margin:10px;
background:#25D366;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}
</style>
</head>

<body>

<h1>RYZEN TECH STORE</h1>

<!-- Products -->
<h3>RAM 16GB - 1200 EGP</h3>
<button onclick="addToCart('RAM 16GB',1200)">Add to Cart</button>

<h3>SSD 512GB - 900 EGP</h3>
<button onclick="addToCart('SSD 512GB',900)">Add to Cart</button>

<hr>

<!-- Cart -->
<h2>Cart 🛒</h2>
<ul id="cart"></ul>

<h3>Total: <span id="total">0</span> EGP</h3>

<!-- WhatsApp Order -->
<a id="orderBtn" target="_blank">
<button>Send Order on WhatsApp</button>
</a>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let total = 0;

function renderCart(){
let list = document.getElementById("cart");
list.innerHTML = "";
total = 0;

cart.forEach(item=>{
let li = document.createElement("li");
li.innerText = item.name + " - " + item.price;
list.appendChild(li);
total += item.price;
});

document.getElementById("total").innerText = total;

// WhatsApp message
let text = "My Order:%0A";
cart.forEach(item=>{
text += item.name + " - " + item.price + "%0A";
});

document.getElementById("orderBtn").href =
"https://wa.me/201070063817?text=" + text;
}

function addToCart(name,price){
cart.push({name,price});
localStorage.setItem("cart",JSON.stringify(cart));
renderCart();
alert("Added ✔");
}

renderCart();
</script>

</body>
</html>
