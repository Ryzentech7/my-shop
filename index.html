<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RYZENTECH</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0a0a0f;
color:white;
}

/* HEADER */
header{
background:#000;
padding:20px;
text-align:center;
font-size:32px;
color:#8b5cf6;
font-weight:bold;
}

/* DESCRIPTION */
.desc{
text-align:center;
color:#aaa;
padding:10px;
}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px;
}

/* CARD */
.card{
background:#111827;
padding:15px;
border-radius:15px;

border:2px solid transparent;
background-image:
linear-gradient(#111827,#111827),
linear-gradient(90deg,red,blue,green);
background-origin:border-box;
background-clip:padding-box,border-box;
}

.card img{
width:100%;
border-radius:10px;
}

.price{
color:#8b5cf6;
font-size:20px;
margin:10px 0;
}

/* STOCK */
.status{
font-weight:bold;
margin:8px 0;
}

.in{color:#00ff88;}
.out{color:#ff4d4d;}

/* BUTTON */
button{
width:100%;
padding:10px;
background:#8b5cf6;
border:none;
color:white;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#a855f7;
}

/* CART */
#cart{
background:#111827;
margin:20px;
padding:20px;
border-radius:15px;
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:10px;
border:none;
background:#1f2937;
color:white;
}

#payinfo{
color:#8b5cf6;
margin-top:10px;
font-weight:bold;
}

</style>

</head>

<body>

<header>
RYZENTECH
</header>

<p class="desc">
Computer Hardware & Accessories Store  
RAM • SSD • Gaming Parts
</p>

<!-- PRODUCTS -->
<div class="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1591488320449-011701bb6704">
<h3>Kingston RAM RGB</h3>
<p class="status in">In Stock</p>
<div class="price">2200 EGP</div>
<button onclick="add('RAM RGB',2200)">Add To Cart</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1587202372775-e229f172b9d7">
<h3>Samsung SSD 1TB</h3>
<p class="status out">Out of Stock</p>
<div class="price">4500 EGP</div>
<button onclick="add('SSD 1TB',4500)">Add To Cart</button>
</div>

</div>

<!-- CART -->
<div id="cart">

<h2>Checkout</h2>

<div id="items"></div>

<input id="customer" placeholder="Full Name">
<input id="phone" placeholder="Phone Number">
<input id="address" placeholder="Address">

<select id="payment" onchange="showPayment()">
<option>Cash on Delivery</option>
<option>InstaPay</option>
<option>Wallet</option>
</select>

<p id="payinfo"></p>

<button onclick="order()">Place Order</button>

</div>

<script>

let cart = [];

// ➕ Add to cart
function add(name,price){
cart.push({name,price});
document.getElementById("items").innerHTML +=
"<p>"+name+" - "+price+" EGP</p>";
}

// 💳 Payment info
function showPayment(){

let p = document.getElementById("payment").value;

if(p === "InstaPay"){
document.getElementById("payinfo").innerText = "Instapay: 01142074413";
}
else if(p === "Wallet"){
document.getElementById("payinfo").innerText = "Wallet: 01142074413";
}
else{
document.getElementById("payinfo").innerText = "";
}

}

// 🚀 ORDER SYSTEM (FULL FIXED)
function order(){

let name = document.getElementById("customer").value;
let phone = document.getElementById("phone").value;
let address = document.getElementById("address").value;
let payment = document.getElementById("payment").value;

if(cart.length === 0){
alert("Cart is empty ❗");
return;
}

if(name === "" || phone === ""){
alert("Please fill name and phone ❗");
return;
}

// 🛒 Items
let itemsText = cart.map(i =>
`• ${i.name} - ${i.price} EGP`
).join("\n");

// 💰 Total
let total = cart.reduce((sum,i)=>sum+i.price,0);

// 🔥 Message
let message = `
🔥 NEW ORDER - RYZENTECH

👤 Name: ${name}
📱 Phone: ${phone}
📍 Address: ${address}

💳 Payment: ${payment}

🛒 ITEMS:
${itemsText}

💰 TOTAL: ${total} EGP
`;

// 📲 Telegram
fetchfetchfetch("https://api.telegram.org/bot8769220770:AAEe6040gs3Y_Ikesi6jmrsElY_sNQLegHQ/sendMessage", {

method:"POST",
headers:{"Content-Type":"application/json"},

body:JSON.stringify({
chat_id:7405848304
text:message
})

});

alert("Order Sent 🔥");

// 🧹 Reset
cart = [];
document.getElementById("items").innerHTML="";
document.getElementById("customer").value="";
document.getElementById("phone").value="";
document.getElementById("address").value="";

}

</script>

</body>
</html>
